<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>这一次—云南</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* 全屏轮播容器 */
        .carousel {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        /* 全屏媒体 —— 保留原图比例，不拉伸变形 */
        .carousel-item {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            /* 关键修改：contain 保留原图比例，不裁剪；如需全屏裁剪用 cover */
            object-fit: contain; 
            opacity: 0;
            transition: opacity 1.8s ease-out; /* 极柔和渐变 */
        }

        .carousel-item.active {
            opacity: 1;
            z-index: 1;
        }

        /* 中央播放按钮 */
        .play-btn {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 50;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 30px;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .play-btn:hover {
            transform: translate(-50%, -50%) scale(1.08);
            background: rgba(255, 255, 255, 0.2);
        }

        .play-btn.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* 底部暂停按钮 */
        .control-btn {
            position: fixed;
            left: 50%;
            bottom: 30px;
            z-index: 50;
            transform: translateX(-50%);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: white;
            display: grid;
            place-items: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .control-btn.show {
            opacity: 1;
            pointer-events: all;
        }

        /* 左右切换箭头 */
        .arrow {
            position: fixed;
            top: 50%;
            z-index: 50;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: grid;
            place-items: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s ease;
            opacity: 0.8;
        }
        .arrow:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
            opacity: 1;
        }
        .arrow-left {
            left: 20px;
        }
        .arrow-right {
            right: 20px;
        }

        /* 标题 */
        .title {
            position: fixed;
            top: 24px;
            left: 0;
            right: 0;
            z-index: 50;
            text-align: center;
            color: white;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            user-select: none;
        }

        /* 隐藏上传面板 */
        .upload-panel {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .upload-panel.show {
            opacity: 1;
            pointer-events: all;
        }

        .upload-box {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 90%;
            max-width: 560px;
            padding: 30px 24px;
            color: white;
            max-height: 85vh;
            overflow-y: auto;
        }

        .upload-box h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #165DFF;
            color: white;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* 新增：导出分享按钮样式 */
        .btn-share {
            background: #36CFC9;
            color: white;
        }

        /* 新增：下载HTML按钮样式 */
        .btn-download {
            background: #722ED1;
            color: white;
        }

        input {
            display: none;
        }

        /* 排序列表 */
        .sort-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sort-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: move;
        }

        .sort-item img, .sort-item video {
            width: 50px;
            height: 50px;
            /* 缩略图保留比例 */
            object-fit: contain;
            background: #111;
            border-radius: 8px;
        }

        .sort-handle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        .delete-btn {
            margin-left: auto;
            background: rgba(255, 60, 60, 0.3);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
        }

        /* 音乐按钮 */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 24px;
            z-index: 50;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        /* 分享提示弹窗 */
        .share-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .share-modal.show {
            display: flex;
        }
        .share-content {
            background: #222;
            padding: 24px;
            border-radius: 16px;
            color: white;
            max-width: 90%;
            width: 400px;
            text-align: center;
        }
        .share-content p {
            margin: 12px 0 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        .share-content textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #333;
            color: white;
            border: 1px solid #444;
            margin-bottom: 16px;
            resize: none;
            height: 80px;
        }
    </style>
</head>

<body>
    <!-- 全屏轮播 -->
    <div class="carousel" id="carousel"></div>

    <!-- 播放按钮 -->
    <div class="play-btn" id="playBtn">
        <i class="fa fa-play"></i>
    </div>

    <!-- 暂停/播放按钮 -->
    <div class="control-btn" id="controlBtn">
        <i class="fa fa-pause" id="controlIcon"></i>
    </div>

    <!-- 左右箭头 -->
    <div class="arrow arrow-left" id="prevBtn">
        <i class="fa fa-angle-left"></i>
    </div>
    <div class="arrow arrow-right" id="nextBtn">
        <i class="fa fa-angle-right"></i>
    </div>

    <!-- 标题：三击打开上传 -->
    <div class="title" id="title">这一次—云南</div>

    <!-- 音乐按钮 -->
    <div class="music-btn" id="musicBtn">
        <i class="fa fa-music"></i>
    </div>
    <audio id="bgm" loop></audio>

    <!-- 隐藏上传面板 -->
    <div class="upload-panel" id="uploadPanel">
        <div class="upload-box">
            <h2>管理媒体 & 音乐</h2>

            <label class="btn btn-primary">
                <input type="file" id="mediaInput" accept="image/*,video/*" multiple>
                上传图片 / 视频
            </label>

            <label class="btn btn-primary">
                <input type="file" id="musicInput" accept="audio/*">
                更换背景音乐
            </label>

            <button class="btn btn-close" id="resetMusic">恢复默认音乐</button>
            <!-- 新增：导出分享按钮 -->
            <button class="btn btn-share" id="shareBtn">导出分享链接</button>
            <!-- 新增：下载HTML文件按钮 -->
            <button class="btn btn-download" id="downloadHtmlBtn">下载旅行日记HTML文件</button>
            <button class="btn btn-close" id="closePanel">关闭</button>

            <div style="margin-top:20px; font-size:14px; opacity:0.7;">拖动调整播放顺序</div>
            <div class="sort-list" id="sortList"></div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-content">
            <h3>分享你的旅行日记</h3>
            <p>复制下方链接，发送给好友即可在线查看（需保留当前网页文件）</p>
            <textarea id="shareText" readonly></textarea>
            <button class="btn btn-close" id="closeShare">关闭</button>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const DEFAULT_BGM = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        const PLAY_DELAY = 4000; // 每张播放4秒
        let mediaList = JSON.parse(localStorage.getItem("travelMedia")) || [];
        let currentIndex = 0;
        let isPlaying = false;
        let timer = null;

        // 默认图片（保留原图比例）
        if (mediaList.length === 0) {
            mediaList = [
                "https://picsum.photos/1920/1080?random=1",
                "https://picsum.photos/1920/1080?random=2",
                "https://picsum.photos/1920/1080?random=3",
                "https://picsum.photos/1920/1080?random=4"
            ];
            saveMedia();
        }

        // 渲染轮播（核心：保留图片原始比例和格式）
        function renderCarousel() {
            const carousel = document.getElementById("carousel");
            carousel.innerHTML = "";
            mediaList.forEach(url => {
                const isVideo = /\.(mp4|webm|mov|avi)/i.test(url);
                const el = document.createElement(isVideo ? "video" : "img");
                el.className = "carousel-item";
                if (isVideo) {
                    el.src = url;
                    el.loop = true;
                    el.muted = true;
                    el.playsInline = true;
                    // 视频保留比例
                    el.style.objectFit = "contain";
                } else {
                    el.src = url;
                    // 关键：图片不压缩/变形，保留原始格式和比例
                    el.style.objectFit = "contain";
                    // 禁用浏览器自动压缩
                    el.loading = "lazy";
                }
                carousel.appendChild(el);
            });
            showSlide(0);
            renderSortList();
        }

        // 纯淡入淡出切换 —— 无闪烁
        function showSlide(index) {
            const items = document.querySelectorAll(".carousel-item");
            items.forEach(i => i.classList.remove("active"));
            if (items[index]) items[index].classList.add("active");
            currentIndex = index;
        }

        // 下一张
        function nextSlide() {
            const nextIdx = (currentIndex + 1) % mediaList.length;
            showSlide(nextIdx);
        }

        // 上一张
        function prevSlide() {
            const prevIdx = (currentIndex - 1 + mediaList.length) % mediaList.length;
            showSlide(prevIdx);
        }

        // 播放
        function startPlay() {
            isPlaying = true;
            document.getElementById("playBtn").classList.add("hide");
            document.getElementById("controlBtn").classList.add("show");
            document.getElementById("controlIcon").className = "fa fa-pause";
            bgm.play().catch(() => { });
            timer = setInterval(nextSlide, PLAY_DELAY);
        }

        // 暂停
        function pausePlay() {
            isPlaying = false;
            clearInterval(timer);
            document.getElementById("controlIcon").className = "fa fa-play";
            bgm.pause();
        }

        // 继续
        function resumePlay() {
            isPlaying = true;
            document.getElementById("controlIcon").className = "fa fa-pause";
            bgm.play().catch(() => { });
            timer = setInterval(nextSlide, PLAY_DELAY);
        }

        // 绑定控制
        document.getElementById("playBtn").addEventListener("click", startPlay);
        document.getElementById("controlBtn").addEventListener("click", () => {
            isPlaying ? pausePlay() : resumePlay();
        });

        // 左右箭头
        document.getElementById("prevBtn").addEventListener("click", () => {
            if (mediaList.length <= 1) return;
            clearInterval(timer);
            prevSlide();
            if (isPlaying) {
                timer = setInterval(nextSlide, PLAY_DELAY);
            }
        });

        document.getElementById("nextBtn").addEventListener("click", () => {
            if (mediaList.length <= 1) return;
            clearInterval(timer);
            nextSlide();
            if (isPlaying) {
                timer = setInterval(nextSlide, PLAY_DELAY);
            }
        });

        // ========== 音乐 ==========
        const bgm = document.getElementById("bgm");
        bgm.src = localStorage.getItem("travelBgm") || DEFAULT_BGM;
        document.getElementById("musicBtn").addEventListener("click", () => {
            bgm.paused ? bgm.play() : bgm.pause();
        });

        // 上传音乐
        document.getElementById("musicInput").addEventListener("change", e => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            bgm.src = url;
            localStorage.setItem("travelBgm", url);
            bgm.play();
        });

        // 重置音乐
        document.getElementById("resetMusic").addEventListener("click", () => {
            bgm.src = DEFAULT_BGM;
            localStorage.removeItem("travelBgm");
            bgm.play();
        });

        // ========== 三击打开面板 ==========
        let clickCount = 0;
        let clickTimer;
        document.getElementById("title").addEventListener("click", () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => clickCount = 0, 600);
            if (clickCount === 3) {
                document.getElementById("uploadPanel").classList.add("show");
                clickCount = 0;
            }
        });

        // 关闭面板
        document.getElementById("closePanel").addEventListener("click", () => {
            document.getElementById("uploadPanel").classList.remove("show");
        });

        // ========== 上传媒体（保留原始文件格式/大小） ==========
        document.getElementById("mediaInput").addEventListener("change", e => {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                // 创建原始文件的URL，不修改格式/大小
                const fileUrl = URL.createObjectURL(f);
                mediaList.push(fileUrl);
            });
            saveMedia();
            renderCarousel();
        });

        // ========== 拖拽排序 ==========
        function renderSortList() {
            const list = document.getElementById("sortList");
            list.innerHTML = "";
            mediaList.forEach((url, i) => {
                const isVideo = /\.(mp4|webm|mov|avi)/i.test(url);
                const item = document.createElement("div");
                item.className = "sort-item";
                item.draggable = true;
                item.dataset.index = i;
                item.innerHTML = `
                    <div class="sort-handle"><i class="fa fa-bars"></i></div>
                    ${isVideo ? `<video src="${url}" muted></video>` : `<img src="${url}">`}
                    <div>${i + 1}</div>
                    <button class="delete-btn" data-i="${i}">删除</button>
                `;
                list.appendChild(item);
            });
            initDrag();
        }

        function initDrag() {
            const items = document.querySelectorAll(".sort-item");
            items.forEach(item => {
                item.addEventListener("dragstart", () => item.classList.add("dragging"));
                item.addEventListener("dragend", () => {
                    item.classList.remove("dragging");
                    const newOrder = [];
                    document.querySelectorAll(".sort-item").forEach(i => newOrder.push(mediaList[i.dataset.index]));
                    mediaList = newOrder;
                    saveMedia();
                    renderCarousel();
                });
            });

            const list = document.getElementById("sortList");
            list.addEventListener("dragover", e => {
                e.preventDefault();
                const after = getDragAfter(list, e.clientY);
                const dragging = document.querySelector(".dragging");
                after ? list.insertBefore(dragging, after) : list.appendChild(dragging);
            });

            // 删除
            document.querySelectorAll(".delete-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    mediaList.splice(btn.dataset.i, 1);
                    saveMedia();
                    renderCarousel();
                });
            });
        }

        function getDragAfter(container, y) {
            const items = [...container.querySelectorAll(".sort-item:not(.dragging)")];
            return items.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                return (offset < 0 && offset > closest.offset) ? { offset, element: child } : closest;
            }, { offset: -Infinity }).element;
        }

        // 保存媒体到本地存储（持久化，关闭网页后仍保留）
        function saveMedia() {
            localStorage.setItem("travelMedia", JSON.stringify(mediaList));
        }

        // ========== 新增：分享功能 ==========
        document.getElementById("shareBtn").addEventListener("click", () => {
            // 获取当前网页的URL（需将文件部署到服务器/本地静态服务）
            const currentUrl = window.location.href;
            // 生成分享文本（说明+链接）
            const shareText = `我的旅行日记：\n${currentUrl}\n（无需下载，直接在线查看）`;
            document.getElementById("shareText").value = shareText;
            // 显示分享弹窗
            document.getElementById("shareModal").classList.add("show");
        });

        // 关闭分享弹窗
        document.getElementById("closeShare").addEventListener("click", () => {
            document.getElementById("shareModal").classList.remove("show");
        });

        // ========== 新增：下载HTML文件功能 ==========
        document.getElementById("downloadHtmlBtn").addEventListener("click", async () => {
            try {
                // 获取当前页面的完整HTML内容
                let htmlContent = document.documentElement.outerHTML;
                
                // 替换localStorage读取逻辑为直接赋值（确保下载的文件包含当前媒体和音乐配置）
                const currentBgm = localStorage.getItem("travelBgm") || DEFAULT_BGM;
                const currentMedia = JSON.parse(localStorage.getItem("travelMedia")) || mediaList;
                
                // 替换初始化逻辑，将动态数据硬编码到HTML中
                htmlContent = htmlContent.replace(
                    /let mediaList = JSON.parse\(localStorage.getItem\("travelMedia"\)\) \|\| \[\];/,
                    `let mediaList = ${JSON.stringify(currentMedia)};`
                ).replace(
                    /bgm.src = localStorage.getItem\("travelBgm"\) \|\| DEFAULT_BGM;/,
                    `bgm.src = "${currentBgm}";`
                );

                // 创建Blob对象
                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                
                // 创建下载链接
                const a = document.createElement('a');
                a.href = url;
                a.download = `这一次—云南_${new Date().getTime()}.html`; // 自定义文件名
                document.body.appendChild(a);
                a.click();
                
                // 清理
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('HTML文件下载成功！');
            } catch (error) {
                console.error('下载HTML失败：', error);
                alert('下载失败，请重试！');
            }
        });

        // 启动
        renderCarousel();
    </script>
</body>
</html>
